openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: EcoStore Ecommerce Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: products
  - name: categories
  - name: orders
  - name: cart
  - name: reviews
  - name: forms
  - name: analytics
  - name: notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "204":
          description: Logged out

  /auth/sso/{provider}:
    get:
      operationId: ssoRedirect
      tags: [auth]
      summary: SSO redirect to provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github, facebook]
      responses:
        "302":
          description: Redirect to provider

  # USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update user role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # CATEGORIES
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # PRODUCTS
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with filters
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, newest, bestseller, rating]
        - name: inStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      summary: Get featured products for homepage
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/trending:
    get:
      operationId: listTrendingProducts
      tags: [products]
      summary: Get trending products
      responses:
        "200":
          description: Trending products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}/stock:
    patch:
      operationId: updateProductStock
      tags: [products]
      summary: Update product stock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  # CART
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current user's cart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear cart
      responses:
        "204":
          description: Cleared

  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "201":
          description: Cart item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items/{productId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  # ORDERS
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (filtered by user if not admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPage"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order (checkout from cart)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # REVIEWS
  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews (optionally filtered by productId)
      parameters:
        - name: productId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewPage"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a product review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # FORM DESIGNER
  /forms:
    get:
      operationId: listForms
      tags: [forms]
      summary: List all form schemas
      responses:
        "200":
          description: Forms list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormSchema"
    post:
      operationId: createForm
      tags: [forms]
      summary: Create a form schema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormSchemaInput"
      responses:
        "201":
          description: Created form schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormSchema"

  /forms/{id}:
    get:
      operationId: getForm
      tags: [forms]
      summary: Get form schema by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Form schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormSchema"
    patch:
      operationId: updateForm
      tags: [forms]
      summary: Update a form schema
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormSchemaUpdate"
      responses:
        "200":
          description: Updated form schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormSchema"
    delete:
      operationId: deleteForm
      tags: [forms]
      summary: Delete a form schema
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /forms/{id}/submissions:
    get:
      operationId: listFormSubmissions
      tags: [forms]
      summary: List submissions for a form
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormSubmission"
    post:
      operationId: submitForm
      tags: [forms]
      summary: Submit a form
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormSubmissionInput"
      responses:
        "201":
          description: Submission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormSubmission"

  # ANALYTICS / DASHBOARD (wow endpoints)
  /analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /analytics/sales:
    get:
      operationId: getSalesChart
      tags: [analytics]
      summary: Get sales over time (chart data)
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 1y]
            default: 30d
      responses:
        "200":
          description: Sales chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesDataPoint"

  /analytics/top-products:
    get:
      operationId: getTopProducts
      tags: [analytics]
      summary: Get top-selling products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /analytics/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [analytics]
      summary: Get recent orders feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /analytics/revenue-by-category:
    get:
      operationId: getRevenueByCategory
      tags: [analytics]
      summary: Revenue breakdown by category
      responses:
        "200":
          description: Revenue by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryRevenue"

  # NOTIFICATIONS
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get user notifications
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "204":
          description: All marked read

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # AUTH
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # USER
    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, customer]
        avatarUrl:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        provider:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        avatarUrl:
          type: string

    RoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, manager, customer]

    # CATEGORY
    Category:
      type: object
      required: [id, name, slug, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        parentId:
          type: ["integer", "null"]
        productCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        parentId:
          type: integer

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        parentId:
          type: integer

    # PRODUCT
    Product:
      type: object
      required: [id, name, slug, price, stock, categoryId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        compareAtPrice:
          type: ["number", "null"]
        stock:
          type: integer
        sku:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        images:
          type: array
          items:
            type: string
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        isFeatured:
          type: boolean
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ProductInput:
      type: object
      required: [name, slug, price, stock, categoryId]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
        compareAtPrice:
          type: number
        stock:
          type: integer
        sku:
          type: string
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        categoryId:
          type: integer
        isFeatured:
          type: boolean
        tags:
          type: array
          items:
            type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
        compareAtPrice:
          type: number
        stock:
          type: integer
        sku:
          type: string
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        categoryId:
          type: integer
        isFeatured:
          type: boolean
        tags:
          type: array
          items:
            type: string

    StockUpdate:
      type: object
      required: [stock]
      properties:
        stock:
          type: integer

    # CART
    CartItem:
      type: object
      required: [productId, productName, price, quantity, imageUrl]
      properties:
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
        quantity:
          type: integer
        imageUrl:
          type: ["string", "null"]
        subtotal:
          type: number

    Cart:
      type: object
      required: [items, total, itemCount]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
        itemCount:
          type: integer

    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer

    # ORDER
    OrderItem:
      type: object
      required: [productId, productName, price, quantity]
      properties:
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
        quantity:
          type: integer
        subtotal:
          type: number
        imageUrl:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, userId, status, total, items, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled, refunded]
        total:
          type: number
        shippingAddress:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        trackingNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    OrderInput:
      type: object
      required: [shippingAddress, paymentMethod]
      properties:
        shippingAddress:
          type: string
        paymentMethod:
          type: string
        notes:
          type: string

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled, refunded]
        trackingNumber:
          type: string
        notes:
          type: string

    # REVIEWS
    Review:
      type: object
      required: [id, productId, userId, rating, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        userAvatar:
          type: ["string", "null"]
        rating:
          type: integer
        title:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        isVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ReviewPage:
      type: object
      required: [data, total, page, limit, averageRating]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        averageRating:
          type: number

    ReviewInput:
      type: object
      required: [productId, rating]
      properties:
        productId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
        body:
          type: string

    # FORM DESIGNER
    FormField:
      type: object
      required: [id, type, label]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [text, textarea, number, email, select, checkbox, radio, date, file, formula, calculated]
        label:
          type: string
        placeholder:
          type: ["string", "null"]
        required:
          type: boolean
        defaultValue:
          type: ["string", "null"]
        options:
          type: array
          items:
            type: string
        rules:
          type: array
          items:
            $ref: "#/components/schemas/FormRule"
        formula:
          type: ["string", "null"]
        validation:
          $ref: "#/components/schemas/FieldValidation"
        order:
          type: integer

    FormRule:
      type: object
      required: [condition, action]
      properties:
        condition:
          type: object
          required: [field, operator, value]
          properties:
            field:
              type: string
            operator:
              type: string
              enum: [equals, not_equals, contains, greater_than, less_than, is_empty, is_not_empty]
            value:
              type: ["string", "null"]
        action:
          type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [show, hide, require, disable, set_value]
            targetField:
              type: ["string", "null"]
            value:
              type: ["string", "null"]

    FieldValidation:
      type: object
      properties:
        minLength:
          type: ["integer", "null"]
        maxLength:
          type: ["integer", "null"]
        min:
          type: ["number", "null"]
        max:
          type: ["number", "null"]
        pattern:
          type: ["string", "null"]

    FormSchema:
      type: object
      required: [id, name, fields, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FormField"
        isPublished:
          type: boolean
        submissionCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FormSchemaInput:
      type: object
      required: [name, fields]
      properties:
        name:
          type: string
        description:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FormField"
        isPublished:
          type: boolean

    FormSchemaUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FormField"
        isPublished:
          type: boolean

    FormSubmission:
      type: object
      required: [id, formId, data, createdAt]
      properties:
        id:
          type: integer
        formId:
          type: integer
        userId:
          type: ["integer", "null"]
        data:
          type: object
        createdAt:
          type: string
          format: date-time

    FormSubmissionInput:
      type: object
      required: [data]
      properties:
        data:
          type: object

    # ANALYTICS
    DashboardStats:
      type: object
      required: [totalRevenue, totalOrders, totalProducts, totalCustomers, pendingOrders, lowStockProducts, revenueGrowth, ordersGrowth]
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        totalProducts:
          type: integer
        totalCustomers:
          type: integer
        pendingOrders:
          type: integer
        lowStockProducts:
          type: integer
        revenueGrowth:
          type: number
        ordersGrowth:
          type: number
        avgOrderValue:
          type: number

    SalesDataPoint:
      type: object
      required: [date, revenue, orders]
      properties:
        date:
          type: string
        revenue:
          type: number
        orders:
          type: integer

    TopProduct:
      type: object
      required: [productId, productName, totalSold, revenue, imageUrl]
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalSold:
          type: integer
        revenue:
          type: number
        imageUrl:
          type: ["string", "null"]

    CategoryRevenue:
      type: object
      required: [categoryId, categoryName, revenue, percentage]
      properties:
        categoryId:
          type: integer
        categoryName:
          type: string
        revenue:
          type: number
        percentage:
          type: number

    # NOTIFICATIONS
    Notification:
      type: object
      required: [id, userId, type, title, isRead, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [order_placed, order_shipped, order_delivered, low_stock, new_review, system]
        title:
          type: string
        message:
          type: ["string", "null"]
        isRead:
          type: boolean
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time
